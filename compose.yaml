services:
  postgres:
    image: postgres:18-alpine
    container_name: eurotransit-catalog-postgres
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
